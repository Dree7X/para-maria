
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Maria</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0a0a0c; color: #f0f0f0; font-family: sans-serif; text-align: center; overflow: hidden; }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        .hidden { display: none !important; }
        button { background: transparent; color: white; border: 1px solid #444; padding: 15px; margin: 5px 0; width: 100%; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        button:active { background: #222; }
        .btn-voltar { margin-top: 30px; border: none; color: #888; background: transparent; text-decoration: underline; cursor: pointer; }
        .lua { font-size: 50px; margin-bottom: 20px; }
        h1 { font-weight: 300; font-size: 1.2rem; line-height: 1.5; }
        /* Player 100% invisível */
        #music-box { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="music-box"></div>

    <div id="tela-inicio" class="container">
        <div class="lua">🌙</div>
        <h1>Bem-vinda, Maria.</h1>
        <button onclick="mudarTela('menu')">Entrar</button>
    </div>

    <div id="tela-menu" class="container hidden">
        <h2>Nossos Dias</h2>
        <div id="lista-botoes">
            <button onclick="verDia(1)">Dia 1</button>
            <button onclick="verDia(2)">Dia 2</button>
            <button onclick="verDia(3)">Dia 3</button>
            <button onclick="verDia(4)">Dia 4</button>
            <button onclick="verDia(5)">Dia 5</button>
            <button onclick="verDia(6)">Dia 6</button>
            <button onclick="verDia(7)" id="btn-7" style="color:#444" onclick="aviso()">Dia 7 (🔒)</button>
        </div>
        <button class="btn-voltar" onclick="mudarTela('inicio')">Sair</button>
    </div>

    <div id="tela-mensagem" class="container hidden">
        <div class="lua">✨</div>
        <h1 id="texto-msg"></h1>
        <button class="btn-voltar" onclick="pararMusica(); mudarTela('menu');">← Voltar</button>
    </div>

    <script>
        const diaLiberado = 6; 

        const linksMusicas = {
            1: "EbVV9FDxM4c", // Imprevisto
            2: "qwzQPh7dW_4", // Star Shopping
            3: "0YmX4_7VvS8", // Radiance
            4: "ZfdpQv9hqQo", // Última Noite
            5: "MWh78SM5G7k", // Oceano
            6: "ZMlNHdYTGQA", // Me Chamando de Paixão
            7: "IqvxFBPcxUg"  // Rainha da Pista
        };

        const mensagens = {
            1: "Você é linda igual a lua, a diferença é que a lua ilumina a noite, e você ilumina a minha vida.",
            2: "Star Shopping: Pra você lembrar de nós dois sempre que olhar pro céu.",
            3: "Radiance: Porque você brilha mais que qualquer luz.",
            4: "Cada noite com você é como se fosse a última.",
            5: "Meu amor por você é um oceano.",
            6: "Você me chamando de paixão é minha coisa favorita.",
            7: "Minha rainha da pista."
        };

        function mudarTela(nome) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('tela-' + nome).classList.remove('hidden');
        }

        function verDia(n) {
            if (n <= diaLiberado) {
                document.getElementById('texto-msg').innerText = mensagens[n];
                
                // Força o carregamento do player APENAS após o clique
                const box = document.getElementById('music-box');
                box.innerHTML = `<iframe src="https://www.youtube.com/embed/${linksMusicas[n]}?autoplay=1&controls=0" allow="autoplay"></iframe>`;
                
                mudarTela('mensagem');
            } else {
                alert("Esse dia ainda não chegou! ❤️");
            }
        }

        function pararMusica() {
            document.getElementById('music-box').innerHTML = "";
        }
    </script>
</body>
</html>
