<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Maria</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0a0a0c; color: #f0f0f0; font-family: sans-serif; text-align: center; }
        .container { width: 90%; max-width: 400px; padding: 20px; }
        .hidden { display: none !important; }
        button { background: transparent; color: white; border: 1px solid #444; padding: 15px; margin: 5px 0; width: 100%; border-radius: 8px; font-size: 1rem; cursor: pointer; }
        .btn-voltar { margin-top: 20px; border: none; color: #888; background: transparent; text-decoration: underline; }
        .lua { font-size: 50px; margin-bottom: 20px; }
        h1 { font-weight: 300; font-size: 1.2rem; line-height: 1.5; }
        .music-player { margin-top: 20px; border-radius: 12px; overflow: hidden; height: 80px; width: 100%; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="tela-inicio" class="container">
        <div class="lua">🌙</div>
        <h1>Bem-vinda, meu amor.</h1>
        <button onclick="mudarTela('menu')">Iniciar</button>
    </div>

    <div id="tela-menu" class="container hidden">
        <h2>Nossa Semana</h2>
        <div id="lista-botoes">
            <button onclick="verDia(1)">Dia 1</button>
            <button onclick="verDia(2)">Dia 2</button>
            <button onclick="verDia(3)">Dia 3</button>
            <button onclick="verDia(4)">Dia 4</button>
            <button onclick="verDia(5)">Dia 5</button>
            <button onclick="verDia(6)">Dia 6</button>
            <button onclick="verDia(7)">Dia 7</button>
        </div>
        <button class="btn-voltar" onclick="mudarTela('inicio')">Sair</button>
    </div>

    <div id="tela-mensagem" class="container hidden">
        <div class="lua">✨</div>
        <h1 id="texto-msg"></h1>
        <div class="music-player">
            <iframe id="youtube-player" width="100%" height="80" src="" frameborder="0" allow="autoplay"></iframe>
        </div>
        <button class="btn-voltar" onclick="pararMusica(); mudarTela('menu');">Voltar aos dias</button>
    </div>

    <script>
        // --- CONTROLE DE LIBERAÇÃO ---
        const diaLiberado = 1; // Mude conforme os dias passarem

        // IDs das músicas que você pediu
        const linksMusicas = {
            1: "EbVV9FDxM4c", // Imprevisto - Yago Oproprio
            2: "qwzQPh7dW_4", // Star Shopping - Lil Peep
            3: "0Y0uR0Y0uR0", // Radiance (Espaço para Link/ID)
            4: "ZfdpQv9hqQo", // Última Noite - Baco Exu do Blues
            5: "MWh78SM5G7k", // Oceano - Djavan
            6: "ZMlNHdYTGQA", // Me Chamando de Paixão - Jorge Ben
            7: "IqvxFBPcxUg"  // Rainha da Pista - ConeCrew
        };

        const mensagens = {
            1: "Você é linda igual a lua, a diferença é que a lua ilumina a noite, e você ilumina a minha vida. - André",
            2: "Frase do dia 2...",
            3: "Frase do dia 3...",
            4: "Frase do dia 4...",
            5: "Frase do dia 5...",
            6: "Frase do dia 6...",
            7: "Frase do dia 7..."
        };

        function mudarTela(nome) {
            document.getElementById('tela-inicio').classList.add('hidden');
            document.getElementById('tela-menu').classList.add('hidden');
            document.getElementById('tela-mensagem').classList.add('hidden');
            document.getElementById('tela-' + nome).classList.remove('hidden');
        }

        function verDia(n) {
            if (n <= diaLiberado) {
                document.getElementById('texto-msg').innerText = mensagens[n];
                const videoId = linksMusicas[n];
                const player = document.getElementById('youtube-player');
                // Adiciona o player do YouTube
                player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
                mudarTela('mensagem');
            } else {
                alert("Calma, apressadinha! Esse dia ainda não chegou. ❤️");
            }
        }

        function pararMusica() {
            document.getElementById('youtube-player').src = "";
        }
    </script>
</body>
</html>
