<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>para maria</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        
        /* Imagem de Fundo com Blur */
        .bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1464802686167-b939a67e06a1?q=80&w=2069&auto=format&fit=crop') no-repeat center center/cover; filter: blur(12px) brightness(0.3); transform: scale(1.1); z-index: -1; }

        .container { width: 85%; max-width: 380px; padding: 25px; background: rgba(0, 0, 0, 0.75); border-radius: 25px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        
        .petala { position: fixed; top: -10%; color: #ff4d6d; font-size: 20px; user-select: none; z-index: 1; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .foto-casal { width: 100%; border-radius: 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); display: block; }

        button { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 14px; margin: 6px 0; width: 100%; border-radius: 15px; font-size: 0.9rem; cursor: pointer; transition: 0.3s; text-transform: lowercase; }
        button:hover { background: rgba(255,77,109,0.2); border-color: #ff4d6d; }
        
        #btn-mute { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); border: 1px solid #444; }
        .lua { font-size: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #ff4d6d); }
    </style>
</head>
<body>

    <div class="bg-blur"></div>
    <button id="btn-mute" class="hidden" onclick="toggleMute()">🔊</button>
    <div id="video-container" style="position: absolute; opacity: 0;"><div id="player"></div></div>

    <div id="tela-inicio" class="container">
        <div class="lua">❤</div>
        <h1 style="font-weight: 300; font-size: 1.1rem;">sobre você, amor.</h1>
        <button onclick="iniciarTudo()">entrar</button>
    </div>

    <div id="tela-menu" class="container hidden">
        <h2 style="font-weight: 300; font-size: 1rem; margin-bottom: 20px;">escolha o dia</h2>
        <div id="botoes-dias"></div>
    </div>

    <div id="tela-mensagem" class="container hidden">
        <img id="foto-dia" src="" class="foto-casal">
        <h1 id="texto-msg" style="font-weight: 300; font-size: 1rem; line-height: 1.5;"></h1>
        <button style="border:none; text-decoration: underline; color:#888; background:transparent;" onclick="mudarTela('menu')">voltar</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isMuted = false;
        const diaLiberado = 1; 

        const fotos = { 1: "foto1.jpg", 2: "foto2.jpg" };
        const mensagens = {
            1: "tudo em ti é especial, detalhe por detalhe, e quanto mais eu te observo, mais eu vejo isso. - André",
            2: "amanhã tem mais uma surpresa aqui... ❤️"
        };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'EbVV9FDxM4c', 
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'EbVV9FDxM4c' }
            });
        }

        function iniciarTudo() {
            player.playVideo();
            document.getElementById('btn-mute').classList.remove('hidden');
            gerarBotoes();
            mudarTela('menu');
            criarPetalas();
        }

        function gerarBotoes() {
            const lista = document.getElementById('botoes-dias');
            lista.innerHTML = "";
            for (let i = 1; i <= 7; i++) {
                const b = document.createElement('button');
                const liberado = i <= diaLiberado;
                b.innerHTML = liberado ? `dia ${i}` : `dia ${i} <span style="font-size:10px">🔒</span>`;
                if (liberado) b.onclick = () => verDia(i);
                else b.style.opacity = "0.4";
                lista.appendChild(b);
            }
        }

        function verDia(n) {
            document.getElementById('texto-msg').innerText = mensagens[n];
            document.getElementById('foto-dia').src = fotos[n];
            mudarTela('mensagem');
        }

        function mudarTela(nome) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('tela-' + nome).classList.remove('hidden');
        }

        function toggleMute() {
            isMuted ? player.unMute() : player.mute();
            document.getElementById('btn-mute').innerText = isMuted ? "🔊" : "🔇";
            isMuted = !isMuted;
        }

        function criarPetalas() {
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'petala';
                p.innerHTML = '❤';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }, 400);
        }
    </script>
</body>
</html>
